      display: flex;
      align-items: center;
      padding: 0 28px;
      height: 60px;

      position: sticky;
      top: 0;

    }

      padding: 4px 10px;
      display: block;
      object-fit: contain;
    }
    .topbar-divider {

      margin: 0 18px;
    }
    .topbar-title { font-size: 15px; font-weight: 500; opacity: 0.92; }
    .topbar-badge {

      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: #52e88e; }

    /* ── 历史报告时间轴条 ── */
    .history-bar {
      background: #fff;
      border-bottom: 1px solid #e5e8ef;
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 60px;
      position: sticky;
      top: 60px;
      z-index: 90;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .history-bar-label {
      font-size: 11px;
      font-weight: 600;
      color: #8a94a6;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .history-bar-sep {
      width: 1px;
      height: 20px;
      background: #e5e8ef;
      flex-shrink: 0;
    }
    .history-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .history-tabs::-webkit-scrollbar { display: none; }
    .history-tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1.5px solid #e5e8ef;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
      background: #fff;
      position: relative;
    }
    .history-tab:hover {
      border-color: #a5b4fc;
      background: #f5f8ff;
    }
    .history-tab.active {
      border-color: #0052a5;
      background: #eff4ff;
    }
    .history-tab.active::after {
      content: '';
      position: absolute;
      bottom: -13px;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 3px;
      background: #0052a5;
      border-radius: 2px 2px 0 0;
    }
    .tab-month {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }
    .history-tab.active .tab-month { color: #0052a5; }

      display: flex;
      align-items: center;
      gap: 4px;
    }
    .tab-pill {

      font-weight: 600;
      padding: 2px 6px;
      border-radius: 8px;
      line-height: 1.4;
    }

    .tab-pill.score-warn { background: #fff7ed; color: #b45309; }
    .tab-pill.flag-pill { background: #fef2f2; color: #b91c1c; }

      background: #0052a5;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 6px;
      letter-spacing: 0.3px;
    }

      padding: 28px 32px;
      max-width: 1100px;
      margin: 0 auto;
    }

      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .report-title-group {}
    .report-title {
      font-size: 22px;
      font-weight: 700;
      color: #0d1b3e;
      line-height: 1.3;
    }
    .report-meta {
      font-size: 13px;
      color: #8a94a6;
      margin-top: 5px;
      display: flex; gap: 16px; flex-wrap: wrap;
    }

      color: #fff;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 12px;
      text-align: center;
      line-height: 1.6;
      flex-shrink: 0;

    .report-status-badge .status-value { font-size: 20px; font-weight: 700; }

    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: #fff;
      border-radius: 12px;
      padding: 18px 20px;
      border: 1px solid #e8ebf2;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);

    .kpi-sub { font-size: 11px; margin-top: 5px; color: #8a94a6; }
    .kpi-card.highlight-blue .kpi-value { color: #0052a5; }
    .kpi-card.highlight-red .kpi-value { color: #dc2626; }
    .kpi-card.highlight-green .kpi-value { color: #16a34a; }
    .kpi-card.highlight-amber .kpi-value { color: #d97706; }

    /* 评分分布图 */
    .section {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e8ebf2;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      margin-bottom: 20px;
      overflow: hidden;

      padding: 16px 22px;
      border-bottom: 1px solid #f0f2f7;
      display: flex; align-items: center; gap: 10px;
    }
    .section-header-icon {

      display: flex; align-items: center; justify-content: center;
      font-size: 14px;

    .icon-amber { background: #fffbeb; }
    .icon-green { background: #f0fdf4; }

    .section-subtitle { font-size: 12px; color: #8a94a6; margin-left: auto; }
    .section-body { padding: 20px 22px; }

    .bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }

    .bar-label { font-size: 11px; color: #8a94a6; white-space: nowrap; }

    .suggestion-item.priority-low { border-left: 3px solid #22c55e; }

      color: #0052a5;
      font-size: 12px;
      font-weight: 700;

      font-size: 10px;
      font-weight: 600;

      .main { padding: 16px; }

  </style>
</head>

      { id: 'aq5', date: '04/14', address: '杭州上城区',   engineer: '赵磊', score: 44, flagged: true,  isNearest: false, distanceDiff: 110, workload: 68, isLowWorkload: false, flagReason: '工程师工时偏高（68h）且差旅距离110km，华东刘洋更近且工时较少' },
      { id: 'aq6', date: '04/17', address: '苏州园区',     engineer: '李明', score: 91, flagged: false, isNearest: true,  distanceDiff: 0,  workload: 52, isLowWorkload: true },
      { id: 'aq7', date: '04/22', address: '上海虹桥区',   engineer: '孙浩', score: 51, flagged: true,  isNearest: false, distanceDiff: 88, workload: 74, isLowWorkload: false, flagReason: '孙浩工时已达74h，本月第二次被高工时派遣，建议介入管理' },
      { id: 'aq8', date: '04/25', address: '南京雨花台区', engineer: '王强', score: 85, flagged: false, isNearest: false, distanceDiff: 15, workload: 48, isLowWorkload: true },
    ],
    suggestions: [
      { priority: 'high', tag: '重点关注', text: '孙浩已连续两月出现工时偏高被派遣的情况（3月77h、4月74h），建议由主管介入复盘，评估是否存在资源调配失衡问题。' },
      { priority: 'high', tag: '规则完善', text: '4月14日杭州任务：华东刘洋距离更近且工时更少，却选用赵磊跨区支援，建议规则引擎对110km以上的跨区派工自动触发二次确认。' },
      { priority: 'low',  tag: '趋势观察', text: '4月均分79分，较3月（82分）小幅回落，主要由月初两条异常记录拉低。建议持续监控，预计5月随规则优化恢复至82分以上。' },
    ],
  },
};

// ── 渲染逻辑 ──────────────────────────────────────────────────────
let currentReport = 'apr-2025';

function getScoreClass(score, flagged) {
  if (flagged) return 'ring-red';
  if (score >= 80) return 'ring-green';
  if (score >= 60) return 'ring-amber';
  return 'ring-red';
}

function renderBarChart(dist) {
  const max = Math.max(...dist.map(d => d.count));
  return dist.map(d => {
    const h = max > 0 ? Math.round((d.count / max) * 72) : 0;
    return `
      <div class="bar-col">
        <span class="bar-count" style="color:${d.color}">${d.count}</span>
        <div class="bar-fill" style="height:${h}px;background:${d.color}"></div>
        <span class="bar-label">${d.label}</span>
      </div>`;
  }).join('');
}

function renderRecords(records) {
  return records.map(r => {
    const ringClass = getScoreClass(r.score, r.flagged);
    const indNearest = r.isNearest
      ? `<span class="indicator ind-pass">✓ 就近选择</span>`
      : `<span class="indicator ind-fail">✗ 就近偏差 (+${r.distanceDiff}km)</span>`;
    const indWorkload = r.isLowWorkload
      ? `<span class="indicator ind-pass">✓ 工时均衡 (${r.workload}h)</span>`
      : `<span class="indicator ind-fail">✗ 工时偏高 (${r.workload}h)</span>`;
    const badge = r.flagged
      ? `<span class="flag-badge">⚠ 异常</span>`
      : `<span class="normal-badge">✓ 正常</span>`;
    const flagReason = r.flagged && r.flagReason
      ? `<div class="flag-reason">💡 ${r.flagReason}</div>` : '';
    return `
      <div class="record-card ${r.flagged ? 'flagged' : ''}">
        <div class="score-ring ${ringClass}">${r.score}</div>
        <div class="record-body">
          <div class="record-title-row">
            <span class="record-title">${r.date} · ${r.address}</span>
            ${badge}
          </div>
          <div class="record-engineer">指派工程师：${r.engineer}</div>
          <div class="indicator-row">${indNearest}${indWorkload}</div>
          ${flagReason}
        </div>
      </div>`;
  }).join('');
}

function renderSuggestions(suggestions) {
  return suggestions.map((s, i) => `
    <div class="suggestion-item priority-${s.priority}">
      <div class="suggestion-num">${i + 1}</div>
      <div class="suggestion-text">
        <span class="suggestion-tag">${s.tag}</span>${s.text}
      </div>
    </div>
  `).join('');
}

function renderReport(reportId) {
  const r = reports[reportId];
  if (!r) return '<div class="empty-state">报告数据不存在</div>';

  const normalCount = r.totalRecords - r.flaggedCount;
  const compliance = Math.round((normalCount / r.totalRecords) * 100);
  const scoreColor = r.avgScore >= 80 ? '#16a34a' : r.avgScore >= 70 ? '#d97706' : '#dc2626';

  return `
    <!-- 报告标题 -->
    <div class="report-header">
      <div class="report-title-group">
        <div class="report-title">📊 ${r.title}</div>
        <div class="report-meta">
          <span>🕐 生成于 ${r.generatedAt}</span>
          <span>📁 共 ${r.totalRecords} 条派工记录</span>
          <span>🤖 AI 自动回溯分析</span>
        </div>
      </div>
      <div class="report-status-badge">
        <div class="status-label">综合评分</div>
        <div class="status-value" style="color:#fff">${r.avgScore}</div>
        <div class="status-label">/ 100</div>
      </div>
    </div>

    <!-- KPI 卡片 -->
    <div class="kpi-row">
      <div class="kpi-card highlight-blue">
        <div class="kpi-label">平均合理性评分</div>
        <div class="kpi-value" style="color:${scoreColor}">${r.avgScore}</div>
        <div class="kpi-sub">满分100分</div>
      </div>
      <div class="kpi-card highlight-red">
        <div class="kpi-label">异常标注记录</div>
        <div class="kpi-value">${r.flaggedCount}</div>
        <div class="kpi-sub">需复盘优化</div>
      </div>
      <div class="kpi-card highlight-green">
        <div class="kpi-label">正常派工记录</div>
        <div class="kpi-value">${normalCount}</div>
        <div class="kpi-sub">符合最优策略</div>
      </div>
      <div class="kpi-card highlight-amber">
        <div class="kpi-label">合规率</div>
        <div class="kpi-value">${compliance}%</div>
        <div class="kpi-sub">目标 ≥ 85%</div>
      </div>
    </div>

    <!-- 评分分布 -->
    <div class="section">
      <div class="section-header">
        <div class="section-header-icon icon-blue">📈</div>
        <span class="section-title">评分分布</span>
        <span class="section-subtitle">${r.month} · ${r.totalRecords} 条记录</span>
      </div>
      <div class="section-body">
        <div class="legend-row">
          <span class="legend-item"><span class="legend-dot" style="background:#22c55e"></span>90-100 优秀</span>
          <span class="legend-item"><span class="legend-dot" style="background:#4ade80"></span>80-89 良好</span>
          <span class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span>60-79 一般</span>
          <span class="legend-item"><span class="legend-dot" style="background:#ef4444"></span>&lt;60 需关注</span>
        </div>
        <div class="bar-chart">${renderBarChart(r.scoreDistribution)}</div>
      </div>
    </div>

    <!-- 派工记录明细 -->
    <div class="section">
      <div class="section-header">
        <div class="section-header-icon icon-amber">📋</div>
        <span class="section-title">派工记录明细</span>
        <span class="section-subtitle">红色标注 = 偏差异常</span>
      </div>
      <div class="section-body">
        <div class="record-list">
          ${renderRecords(r.records)}
        </div>
      </div>
    </div>

    <!-- 优化建议 -->
    <div class="section">
      <div class="section-header">
        <div class="section-header-icon icon-green">💡</div>
        <span class="section-title">AI 优化建议</span>
        <span class="section-subtitle">基于本月偏差分析自动生成</span>
      </div>
      <div class="section-body">
        <div class="suggestion-list">
          ${renderSuggestions(r.suggestions)}
        </div>
      </div>
    </div>
  `;
}

function switchReport(reportId) {
  // 更新时间轴条激活状态
  document.querySelectorAll('.history-tab').forEach(el => el.classList.remove('active'));
  const tabEl = document.getElementById('tab-' + reportId);
  if (tabEl) {
    tabEl.classList.add('active');
    tabEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
  // 渲染主内容
  document.getElementById('main-content').innerHTML = renderReport(reportId);
  currentReport = reportId;
  // 更新 URL hash
  history.replaceState(null, '', '#' + reportId);
}

// ── 初始化 ────────────────────────────────────────────────────────
(function init() {
  const hash = location.hash.replace('#', '');
  const target = reports[hash] ? hash : 'apr-2025';
  switchReport(target);
})();
</script>
